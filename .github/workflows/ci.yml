name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=9

    env:
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/testdb
      SECRET_KEY: testsecrethghggugugyy

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio "httpx>=0.24"

      - name: Wait for database (max 30s)
        run: |
          echo "Waiting for Postgres..."
          SECONDS=0
          until pg_isready -h localhost -U testuser; do
            if [ $SECONDS -ge 30 ]; then
              echo "Timeout reached: Postgres is still unavailable"
              exit 1
            fi
            echo "Postgres unavailable - sleeping"
            sleep 1
          done
          echo "Postgres is up - continuing"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest 