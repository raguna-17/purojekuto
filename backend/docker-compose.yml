services:

  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build: .
    env_file:
      - .env
    volumes:
      - .:/sagyou
    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


volumes:
  postgres_data: